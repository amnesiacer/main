<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝宝找E口</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: "Comic Sans MS", "Verdana", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .decoration {
            position: fixed;
            font-size: 40px;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        #letter-e-container {
            position: relative;
            z-index: 10;
        }

        #letter-e {
            font-size: 300px;
            font-weight: 900;
            color: #FF1493;
            text-shadow: 8px 8px 0px #FFB6C1;
            line-height: 1;
            transition: transform 0.4s ease-out;
            font-family: "Arial Black", sans-serif;
        }

        #guide-area {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .mascot {
            font-size: 80px;
            animation: bounce 1s infinite;
        }

        .speech-bubble {
            background: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 24px;
            color: #333;
            margin-left: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 10px;
            z-index: 10;
        }

        .direction-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid white;
            font-size: 70px; /* 小手稍微调大一点 */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.1s;
            touch-action: manipulation;
            background-color: white; /* 白底更显手的颜色 */
        }

        /* 给按钮加一点点不同的边框色，增加区分度 */
        .btn-up { border-color: #FFD700; }
        .btn-down { border-color: #87CEEB; }
        .btn-left { border-color: #98FB98; }
        .btn-right { border-color: #FFA07A; }

        .direction-btn:active {
            transform: scale(0.9);
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
            background-color: #f0f0f0;
        }

        .placeholder { visibility: hidden; }

        #celebration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .emoji-float {
            position: absolute;
            font-size: 60px;
            animation: emojiRain 2s linear forwards;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes emojiRain {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- 背景装饰 -->
    <div class="decoration" style="top: 10%; left: 10%;">🌸</div>
    <div class="decoration" style="top: 20%; right: 15%; animation-delay: 1s;">⭐</div>
    <div class="decoration" style="bottom: 15%; left: 20%; animation-delay: 2s;">🎈</div>
    <div class="decoration" style="bottom: 25%; right: 10%; animation-delay: 0.5s;">🍭</div>

    <div id="celebration"></div>

    <!-- 游戏主区域 -->
    <div id="letter-e-container">
        <div id="letter-e">E</div>
    </div>

    <!-- 引导区 -->
    <div id="guide-area">
        <div class="mascot">🐰</div>
        <div class="speech-bubble">指一指，E的嘴巴在哪？</div>
    </div>

    <!-- 按钮区：这里把箭头换成了小手 -->
    <div class="btn-container">
        <div class="placeholder"></div>
        <button class="direction-btn btn-up" onclick="checkAnswer('up')">👆</button>
        <div class="placeholder"></div>
        
        <button class="direction-btn btn-left" onclick="checkAnswer('left')">👈</button>
        <div class="placeholder"></div>
        <button class="direction-btn btn-right" onclick="checkAnswer('right')">👉</button>
        
        <div class="placeholder"></div>
        <button class="direction-btn btn-down" onclick="checkAnswer('down')">👇</button>
        <div class="placeholder"></div>
    </div>

    <script>
        let currentAnswer = '';
        const eElement = document.getElementById('letter-e');
        const celebrationBox = document.getElementById('celebration');

        // 方向映射
        const directions = [
            { answer: 'right', rotation: 0 },
            { answer: 'down',  rotation: 90 },
            { answer: 'left',  rotation: 180 },
            { answer: 'up',    rotation: 270 }
        ];

        function startGame() {
            const randomIndex = Math.floor(Math.random() * directions.length);
            const dir = directions[randomIndex];
            
            currentAnswer = dir.answer;
            
            eElement.style.transition = 'none';
            eElement.style.opacity = 0;
            
            setTimeout(() => {
                eElement.style.transition = 'transform 0.4s ease-out, opacity 0.4s';
                eElement.style.transform = `rotate(${dir.rotation}deg)`;
                eElement.style.opacity = 1;
            }, 50);
        }

        function checkAnswer(userChoice) {
            if (userChoice === currentAnswer) {
                partyTime();
                playSound("太棒啦！", 1.8);
                setTimeout(startGame, 2000);
            } else {
                playSound("再找找看", 1.2);
            }
        }

        function partyTime() {
            celebrationBox.innerHTML = '';
            const emojis = ['🎉', '🌟', '👏', '💖', '🚀', '🍰'];
            
            for(let i=0; i<20; i++) {
                const emoji = document.createElement('div');
                emoji.classList.add('emoji-float');
                emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 100 + 'vw';
                emoji.style.animationDelay = Math.random() * 0.5 + 's';
                celebrationBox.appendChild(emoji);
            }
            
            setTimeout(() => celebrationBox.innerHTML = '', 2500);
        }

        function playSound(text, pitchVal) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.1;
                utterance.pitch = pitchVal;
                speechSynthesis.speak(utterance);
            }
        }

        startGame();
    </script>
</body>
</html>
