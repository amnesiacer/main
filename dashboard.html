<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帮扶项目收益管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;-webkit-text-size-adjust:100%}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px 16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:13px;opacity:.85;margin-top:4px}
.nav{display:flex;gap:0;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.nav button{flex:1;padding:12px 4px;border:none;background:none;font-size:14px;cursor:pointer;color:#666;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.nav button:hover{color:#1a73e8;background:#f5f8ff}
.nav button.active{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:600}
.container{max-width:1200px;margin:16px auto;padding:0 12px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);padding:16px;margin-bottom:12px}
.card h2{font-size:16px;color:#1a73e8;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8eaed}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:linear-gradient(135deg,#f8f9ff,#e8f0fe);border-radius:8px;padding:12px 8px;text-align:center}
.stat-card .num{font-size:22px;font-weight:700;color:#1a73e8}
.stat-card .label{font-size:12px;color:#666;margin-top:2px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{background:#f8f9fa;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e0e0e0;position:sticky;top:0;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #eee}
tr:hover td{background:#f5f8ff}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-ok{background:#e6f4ea;color:#137333}
.badge-warn{background:#fef7e0;color:#b06000}
.badge-danger{background:#fce8e6;color:#c5221f}
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;width:100%;min-width:120px}
.filter-bar select:focus,.filter-bar input:focus{border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.tab-content{display:none}
.tab-content.active{display:block}
.amount{text-align:right;font-variant-numeric:tabular-nums}
.project-card{padding:14px;border:1px solid #e8eaed;border-radius:8px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.project-card:hover{border-color:#1a73e8;box-shadow:0 2px 8px rgba(26,115,232,.12)}
.project-card .proj-name{font-size:15px;font-weight:600;color:#1a73e8;line-height:1.4}
.project-card .proj-info{font-size:12px;color:#888;margin-top:4px;line-height:1.4}
.project-card .proj-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.project-card .due{font-size:13px;color:#666}
.project-card .arrear{font-size:13px;font-weight:600}
.project-card .arrear-ok{color:#137333}
.project-card .arrear-bad{color:#c5221f}
.project-card .village-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.project-card .village-tag{background:#e8f0fe;color:#1a73e8;font-size:11px;padding:2px 8px;border-radius:10px}
.empty{text-align:center;padding:30px;color:#999;font-size:14px}
.back-btn{display:inline-block;padding:6px 12px;background:#e8f0fe;color:#1a73e8;border-radius:6px;font-size:13px;cursor:pointer;margin-bottom:12px;border:none}
.back-btn:hover{background:#d2e3fc}
@media(min-width:769px){
  .stats{grid-template-columns:repeat(4,1fr)}
  .filter-bar select,.filter-bar input{width:auto}
  .stat-card .num{font-size:28px}
  .stat-card .label{font-size:13px}
  .container{padding:0 24px}
  .card{padding:20px}
  .card h2{font-size:18px}
  table{font-size:14px;min-width:auto}
  th,td{padding:10px 12px}
}
</style>
</head>
<body>
<div class="header">
<h1>📊 帮扶项目收益管理</h1>
<p>数据看板 · 支持项目查询、收益明细、拖欠明细</p>
</div>
<div class="nav">
<button class="active" onclick="showTab('projects')">📋 项目概览</button>
<button onclick="showTab('income')">📈 收益明细</button>
<button onclick="showTab('arrears')">⚠️ 拖欠明细</button>
</div>
<div class="container">
<!-- 项目概览 -->
<div id="tab-projects" class="tab-content active">
<div class="stats" id="summary-stats"></div>
<div class="card">
<h2>项目列表</h2>
<div class="filter-bar">
<input type="text" id="proj-search" placeholder="搜索项目名称..." oninput="renderProjects()">
</div>
<div id="project-list"></div>
</div>
</div>
<!-- 收益明细 -->
<div id="tab-income" class="tab-content">
<div class="card">
<h2>收益明细</h2>
<div class="filter-bar">
<select id="income-proj-filter" onchange="renderIncome()"><option value="">全部项目</option></select>
<select id="income-status-filter" onchange="renderIncome()">
<option value="">全部状态</option>
<option value="arrear">有拖欠</option>
<option value="settled">已结清</option>
<option value="undistributed">未分配</option>
<option value="future">未到期</option>
</select>
</div>
<div id="income-back" style="display:none"></div>
<div class="table-wrap"><table><thead><tr id="income-thead">
<th>项目名称</th><th>收益周期</th><th class="amount">应缴(万元)</th>
<th class="amount">实缴(万元)</th><th class="amount">拖欠(万元)</th><th>分配状态</th>
</tr></thead><tbody id="income-tbody"></tbody></table></div>
</div>
</div>
<!-- 拖欠明细 -->
<div id="tab-arrears" class="tab-content">
<div class="stats" id="arrear-stats"></div>
<div class="card">
<h2>拖欠明细</h2>
<div class="filter-bar">
<select id="arrear-proj-filter" onchange="renderArrears()"><option value="">全部项目</option></select>
</div>
<div class="table-wrap"><table><thead><tr>
<th>项目名称</th><th>涉及村</th><th>收益周期</th><th class="amount">应缴(万元)</th>
<th class="amount">实缴(万元)</th><th class="amount">拖欠(万元)</th><th>承租方</th>
</tr></thead><tbody id="arrears-tbody"></tbody></table></div>
</div>
</div>
</div>

function fmt(n){n=Number(n);return isNaN(n)?'0.00':n.toFixed(2)}
function fmtDate(d){if(!d)return'';return d.substring(0,10)}

function showTab(id){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
const tabs=['projects','income','arrears'];
const idx=tabs.indexOf(id);
document.querySelectorAll('.nav button')[idx].classList.add('active');
if(id==='income')renderIncome();
if(id==='arrears')renderArrears();
if(id==='projects')renderProjects();
}

function renderProjects(){
const q=document.getElementById('proj-search').value.toLowerCase();
const filtered=projects.filter(p=>!q||p.name.toLowerCase().includes(q));
const totalDue=filtered.reduce((s,p)=>s+Number(p.total_due),0);
const totalPaid=filtered.reduce((s,p)=>s+Number(p.total_paid),0);
const totalArrear=filtered.reduce((s,p)=>s+Number(p.total_arrear),0);
document.getElementById('summary-stats').innerHTML=
'<div class="stat-card"><div class="num">'+filtered.length+'</div><div class="label">项目总数</div></div>'+
'<div class="stat-card"><div class="num">'+fmt(totalDue)+'</div><div class="label">应收总额(万元)</div></div>'+
'<div class="stat-card"><div class="num">'+fmt(totalPaid)+'</div><div class="label">已收总额(万元)</div></div>'+
'<div class="stat-card"><div class="num" style="color:'+(totalArrear>0?'#c5221f':'#137333')+'">'+fmt(totalArrear)+'</div><div class="label">拖欠总额(万元)</div></div>';
const el=document.getElementById('project-list');
if(!filtered.length){el.innerHTML='<div class="empty">无匹配项目</div>';return}
el.innerHTML=filtered.map(p=>{
const arrear=Number(p.total_arrear);
const isMerged=p.sub_projects&&p.sub_projects.length>1;
const villages=p.villages?(typeof p.villages==='string'?p.villages:p.villages.join(', ')):'';
let arrearHtml=arrear>0?'<span class="arrear arrear-bad">拖欠 '+fmt(arrear)+' 万</span>':'<span class="arrear arrear-ok">已结清</span>';
// Village tags for merged projects
let villageHtml='';
if(villages){
villageHtml='<div class="village-tags">'+villages.split(', ').map(v=>'<span class="village-tag">'+v+'</span>').join('')+'</div>';
}
return'<div class="project-card" onclick="viewProject(\''+p.name+'\')">'+
'<div class="proj-name">'+p.name+'</div>'+
'<div class="proj-info">'+(p.operator||'')+' · 合同 '+fmtDate(p.contract_start)+'~'+fmtDate(p.contract_end)+'</div>'+
villageHtml+
'<div class="proj-footer"><span class="due">应收 '+fmt(p.total_due)+' 万</span>'+arrearHtml+'</div>'+
'</div>'}).join('');
}

function viewProject(name){
const p=projects.find(pr=>pr.name===name);
if(p&&p.sub_projects&&p.sub_projects.length>1){
// Merged project: filter income by all sub-project names
document.getElementById('income-proj-filter').value='';
showTab('income');
renderIncomeMerged(p);
}else{
document.getElementById('income-proj-filter').value=name;
showTab('income');
renderIncome();
}
}

function renderIncomeMerged(p){
const subNames=p.sub_projects.map(s=>s.name);
let filtered=incomeRecords.filter(r=>subNames.includes(r.project_name)&&!r.is_future);
const el=document.getElementById('income-tbody');
document.getElementById('income-thead').innerHTML=
'<th>涉及村</th><th>收益周期</th><th class="amount">应缴(万元)</th>'+
'<th class="amount">实缴(万元)</th><th class="amount">拖欠(万元)</th>';
const backEl=document.getElementById('income-back');
backEl.style.display='block';

if(!filtered.length){el.innerHTML='<tr><td colspan="5" class="empty">无匹配记录</td></tr>';return}

'<td class="amount">'+fmt(g.due)+'</td>'+
'<td class="amount">'+fmt(g.paid)+'</td>'+
'<td class="amount'+(g.arrear>0?' amount-neg':'')+'">'+fmt(g.arrear)+'</td></tr>'}).join('');
}

function getVillageForRecord(r, p){
if(p&&p.sub_projects){
const sp=p.sub_projects.find(s=>s.name===r.project_name);
if(sp&&sp.villages&&sp.villages.length)return sp.villages.join(', ');
}
return r.project_name;
}

function getMergedName(rn){
for(const p of projects){
if(p.sub_projects&&p.sub_projects.some(s=>s.name===rn))return p.name;
}
return rn;
}
function getMergedPillarName(rn){
for(const p of projects){
if(p.sub_projects){
const sp=p.sub_projects.find(s=>s.name===rn);
if(sp&&sp.villages&&sp.villages.length)return sp.villages.join(', ');
}
}
return rn;
}
function getMergedOperator(rn){
for(const p of projects){
if(p.sub_projects&&p.sub_projects.some(s=>s.name===rn))return p.operator||'';
}
for(const p of projects){
if(p.name===rn)return p.operator||'';
}
return '';
}
function groupMerged(records){
const map={};
records.forEach(r=>{
const mn=getMergedName(r.project_name);
const key=mn+'||'+r.period_label;
if(!map[key])map[key]={mergedName:mn,period_label:r.period_label,due:0,paid:0,arrear:0,is_future:r.is_future,has_arrear:false,is_distributed:true,villages:[]};
const g=map[key];
g.due+=Number(r.due_amount);
g.paid+=Number(r.paid_amount);
g.arrear+=Number(r.arrear_amount);
if(Number(r.arrear_amount)>0)g.has_arrear=true;
if(!r.is_distributed)g.is_distributed=false;
const v=getMergedPillarName(r.project_name);
if(v&&!g.villages.includes(v))g.villages.push(v);
});
return Object.values(map);
}

filtered=filtered.filter(r=>r.is_future);

filtered=filtered.filter(r=>!r.is_future&&Number(r.arrear_amount)>0);

}else{
filtered=filtered.filter(r=>!r.is_future);
}
const grouped=groupMerged(filtered);
const el=document.getElementById('income-tbody');
if(!grouped.length){el.innerHTML='<tr><td colspan="6" class="empty">无匹配记录</td></tr>';return}
el.innerHTML=grouped.map(g=>{
return'<tr><td>'+g.mergedName+'</td><td>'+g.villages.join('、')+'</td><td>'+g.period_label+'</td>'+
'<td class="amount">'+fmt(g.due)+'</td>'+
'<td class="amount">'+fmt(g.paid)+'</td>'+
'<td class="amount'+(g.arrear>0?' amount-neg':'')+'">'+fmt(g.arrear)+'</td></tr>'}).join('');
}

const grouped=groupMerged(filtered);
const totalDue=grouped.reduce((s,g)=>s+g.due,0);
const totalPaid=grouped.reduce((s,g)=>s+g.paid,0);
const totalArrear=grouped.reduce((s,g)=>s+g.arrear,0);
document.getElementById('arrear-stats').innerHTML=
'<div class="stat-card"><div class="num" style="color:#c5221f">'+grouped.length+'</div><div class="label">拖欠笔数</div></div>'+
'<div class="stat-card"><div class="num">'+fmt(totalDue)+'</div><div class="label">应收(万元)</div></div>'+
'<div class="stat-card"><div class="num">'+fmt(totalPaid)+'</div><div class="label">已收(万元)</div></div>'+
'<div class="stat-card"><div class="num" style="color:#c5221f">'+fmt(totalArrear)+'</div><div class="label">拖欠总额(万元)</div></div>';
const el=document.getElementById('arrears-tbody');
if(!grouped.length){el.innerHTML='<tr><td colspan="7" class="empty">无拖欠记录</td></tr>';return}
el.innerHTML=grouped.map(g=>{
const operator=getMergedOperator(filtered.find(r=>getMergedName(r.project_name)===g.mergedName&&r.period_label===g.period_label).project_name);
return'<tr><td>'+g.mergedName+'</td><td>'+g.villages.join('、')+'</td><td>'+g.period_label+'</td>'+
'<td class="amount">'+fmt(g.due)+'</td>'+
'<td class="amount">'+fmt(g.paid)+'</td>'+
'<td class="amount amount-neg">'+fmt(g.arrear)+'</td>'+
'<td>'+(operator||'')+'</td></tr>'}).join('');
}

// Init
renderProjects();
// Populate filters
const sel=document.getElementById('income-proj-filter');
projects.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name;sel.appendChild(o)});
const sel2=document.getElementById('arrear-proj-filter');
projects.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name;sel2.appendChild(o)});
</script>
</body>
